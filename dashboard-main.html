<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball 3er Contest - Kontrolle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }
        
        .container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 550px;
            border: 1px solid #333;
        }
        
        h1 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .subtitle {
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .time-display {
            font-size: 80px;
            font-weight: 700;
            color: #ffffff;
            margin: 40px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            background: #252525;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            transition: color 0.3s ease;
        }
        
        .time-display.paused {
            color: #ff9500;
        }
        
        .time-settings {
            background: #252525;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        
        .time-settings label {
            display: block;
            color: #999;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .time-inputs {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .time-inputs input {
            width: 80px;
            padding: 12px;
            font-size: 20px;
            border: 1px solid #444;
            border-radius: 8px;
            text-align: center;
            background: #1a1a1a;
            color: #ffffff;
            font-weight: 600;
        }
        
        .time-inputs input:focus {
            outline: none;
            border-color: #666;
            background: #202020;
        }
        
        .time-inputs span {
            font-size: 28px;
            font-weight: 700;
            color: #666;
        }
        
        .time-settings button {
            background: #333;
            color: #ffffff;
            padding: 12px 30px;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .time-settings button:hover {
            background: #404040;
            border-color: #555;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin: 35px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 16px 35px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            flex: 1;
            min-width: 150px;
        }
        
        .btn-toggle {
            background: #ffffff;
            color: #000000;
        }
        
        .btn-toggle:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }
        
        .btn-toggle:active {
            background: #d0d0d0;
            transform: translateY(0);
        }
        
        .btn-reset {
            background: #666;
            color: #ffffff;
        }
        
        .btn-reset:hover {
            background: #777;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(100, 100, 100, 0.3);
        }
        
        .btn-reset:active {
            background: #555;
            transform: translateY(0);
        }
        
        .status {
            margin-top: 30px;
            padding: 20px;
            background: #252525;
            border-radius: 12px;
            font-size: 14px;
            color: #999;
            border: 1px solid #333;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .status.running {
            background: #2a2a2a;
            color: #ffffff;
            border-color: #444;
        }
        
        .status.stopped {
            background: #252525;
            color: #999;
            border-color: #333;
        }
        
        .status.paused {
            background: #2a2a2a;
            color: #ff9500;
            border-color: #666;
        }
        
        .keyboard-info {
            margin-top: 25px;
            padding: 20px;
            background: #252525;
            border-radius: 12px;
            font-size: 12px;
            color: #999;
            line-height: 1.8;
            border: 1px solid #333;
            text-align: center;
        }
        
        .keyboard-info strong {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .open-display {
            margin-top: 25px;
            padding: 20px;
            background: #252525;
            border-radius: 12px;
            font-size: 13px;
            color: #999;
            border: 1px solid #333;
        }
        
        .open-display p {
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .open-display button {
            background: #333;
            color: #ffffff;
            padding: 12px 25px;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .open-display button:hover {
            background: #404040;
            border-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 TROJKA ZA HRAM</h1>
        <div class="subtitle">Petrovdan 2026</div>
        
        <div class="time-display" id="timeDisplay">01:00</div>
        
        <div class="time-settings">
            <label>⏱️ Zeit einstellen</label>
            <div class="time-inputs">
                <input type="number" id="minutes" min="0" max="59" value="1" placeholder="Min">
                <span>:</span>
                <input type="number" id="seconds" min="0" max="59" value="00" placeholder="Sec">
            </div>
            <button onclick="setCustomTime()">Zeit setzen</button>
        </div>
        
        <div class="button-group">
            <button class="btn-toggle" onclick="toggleTimer()">▶ START / ⏸ PAUSE</button>
            <button class="btn-reset" onclick="resetTimer()">🔄 RESET</button>
        </div>
        
        <div class="status" id="status">
            ● GESTOPPT
        </div>
        
        <div class="keyboard-info">
            <strong>⌨️ Tastenkürzel</strong>
            ENTER = Start/Pause<br>
            R = Reset
        </div>
        
        <div class="open-display">
            <p>📺 Öffne das Anzeige-Fenster</p>
            <button onclick="openDisplay()">Fenster öffnen</button>
        </div>
    </div>

    <script>
        let timerInterval = null;
        const INITIAL_TIME = 60; // 60 Sekunden = 1:00
        
        // Initialisiere Zeit im localStorage
        if (!localStorage.getItem('countdownTime')) {
            localStorage.setItem('countdownTime', INITIAL_TIME);
            localStorage.setItem('isRunning', 'false');
        }
        
        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                toggleTimer();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                resetTimer();
            }
        });
        
        // Synchronisiere mit anderen Fenstern
        window.addEventListener('storage', (e) => {
            if (e.key === 'countdownTime' || e.key === 'isRunning') {
                updateDisplay();
            }
        });
        
        function updateDisplay() {
            const time = parseInt(localStorage.getItem('countdownTime') || INITIAL_TIME);
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            const timeDisplayEl = document.getElementById('timeDisplay');
            
            timeDisplayEl.textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            updateStatus();
            updateTimeDisplayColor();
        }
        
        function updateTimeDisplayColor() {
            const timeDisplayEl = document.getElementById('timeDisplay');
            const isRunning = localStorage.getItem('isRunning') === 'true';
            
            if (isRunning) {
                timeDisplayEl.classList.remove('paused');
            } else {
                timeDisplayEl.classList.add('paused');
            }
        }
        
        function updateStatus() {
            const isRunning = localStorage.getItem('isRunning') === 'true';
            const status = document.getElementById('status');
            if (isRunning) {
                status.textContent = '● LÄUFT';
                status.className = 'status running';
            } else {
                status.textContent = '● PAUSIERT';
                status.className = 'status paused';
            }
        }
        
        function setCustomTime() {
            const isRunning = localStorage.getItem('isRunning') === 'true';
            if (isRunning) {
                alert('Stoppe den Timer zuerst!');
                return;
            }
            
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            
            if (minutes < 0 || minutes > 59 || seconds < 0 || seconds > 59) {
                alert('Bitte gültige Werte eingeben (0-59)');
                return;
            }
            
            const totalSeconds = minutes * 60 + seconds;
            localStorage.setItem('countdownTime', totalSeconds);
            updateDisplay();
        }
        
        function toggleTimer() {
            const isRunning = localStorage.getItem('isRunning') === 'true';
            
            if (isRunning) {
                // Stoppen
                localStorage.setItem('isRunning', 'false');
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            } else {
                // Starten
                localStorage.setItem('isRunning', 'true');
                startCountdown();
            }
            
            updateDisplay();
        }
        
        function startCountdown() {
            if (timerInterval) return;
            
            timerInterval = setInterval(() => {
                let time = parseInt(localStorage.getItem('countdownTime') || INITIAL_TIME);
                const isRunning = localStorage.getItem('isRunning') === 'true';
                
                if (!isRunning) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    return;
                }
                
                if (time > 0) {
                    time--;
                    localStorage.setItem('countdownTime', time);
                    updateDisplay();
                } else {
                    localStorage.setItem('isRunning', 'false');
                    clearInterval(timerInterval);
                    timerInterval = null;
                    updateDisplay();
                    playSound();
                }
            }, 1000);
        }
        
        function resetTimer() {
            localStorage.setItem('countdownTime', INITIAL_TIME);
            localStorage.setItem('isRunning', 'false');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('minutes').value = '1';
            document.getElementById('seconds').value = '00';
            updateDisplay();
        }
        
        function openDisplay() {
            const width = 1400;
            const height = 800;
            window.open('dashboard-display.html', 'TimerDisplay', 
                `width=${width},height=${height},menubar=no,toolbar=no,location=no,status=no`);
        }
        
        function playSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        // Initialisiere beim Laden
        updateDisplay();
    </script>
</body>
</html>
